<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Biotech/Pharma Tracker</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="header">
    <div class="container header-row">
      <div>
        <h1>Biotech/Pharma Tracker</h1>
        <p class="sub">Funding rounds + M&amp;A deals. Use filters or ask in plain English.</p>
      </div>
      <div class="header-actions">
        <button id="refreshBtn" class="btn">Refresh</button>
      </div>
    </div>

    <div class="container tabs-row">
      <div class="tabs">
        <select id="mode" class="select">
          <option value="funding">Funding</option>
          <option value="deals">Deals (M&amp;A)</option>
          <option value="both">Both</option>
        </select>
      </div>

      <div class="quick-filters">
        <select id="datePreset" class="select">
          <option value="all">All</option>
          <option value="today">Today</option>
          <option value="last_7">Last 7 days</option>
          <option value="last_30">Last 30 days</option>
          <option value="ytd">YTD</option>
        </select>
        <button id="openFilters" class="btn">Advanced filters</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <div class="panel-title">Ask the tracker</div>
      <div class="chat">
        <div class="chat-row">
          <input id="chatInput" class="chat-input" placeholder="e.g., funding in last week / acquisitions this month / oncology + eli lilly + 500k" />
          <button id="chatSend" class="btn primary">Ask</button>
        </div>
        <div id="chatAnswer" class="chat-answer"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div class="panel-title" id="tableTitle">Funding</div>
        <div class="meta">
          <span id="resultCount">0</span>
          <span class="dot">•</span>
          <span id="updatedLabel">—</span>
        </div>
      </div>

      <div class="table-wrap">
        <table id="dataTable">
          <thead id="thead"></thead>
          <tbody id="resultsTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="drawerBackdrop" class="backdrop hidden"></div>
  <aside id="drawer" class="drawer hidden">
    <div class="drawer-head">
      <div class="drawer-title">Advanced filters</div>
      <button id="closeFilters" class="btn">Close</button>
    </div>

    <div class="drawer-grid">
      <label class="field">
        <span>Keyword</span>
        <input id="qDrawer" class="input" placeholder="Company, investor, acquirer, etc." />
      </label>

      <label class="field">
        <span>Geo</span>
        <select id="geo" class="select">
          <option value="">Any</option>
          <option value="US">US</option>
          <option value="Europe">Europe</option>
          <option value="APAC">APAC</option>
          <option value="ROW">ROW</option>
        </select>
      </label>

      <label class="field">
        <span>Modality</span>
        <input id="modality" class="input" placeholder="Small molecule, mAb, gene therapy, RNA, ADC..." />
      </label>

      <label class="field">
        <span>Therapeutic area (comma-separated)</span>
        <input id="therapeuticArea" class="input" placeholder="e.g., Oncology, Immunology" />
      </label>

      <label class="field">
        <span>Segment</span>
        <input id="segment" class="input" placeholder="ADMET/PK, SBDD, Drug Repurposing, GenChem..." />
      </label>

      <label class="field" style="grid-column: 1 / -1;">
        <span>Amount range (USD)</span>

        <div class="filter-row">
          <label for="minAmount">Min Amount: <span id="minAmountLabel"></span></label>
          <input id="minAmount" type="range" min="0" max="2000000000" step="100000" value="0">
        </div>

        <div class="filter-row">
          <label for="maxAmount">Max Amount: <span id="maxAmountLabel"></span></label>
          <input id="maxAmount" type="range" min="0" max="2000000000" step="100000" value="2000000000">
        </div>
      </label>
    </div>

    <div class="drawer-actions">
      <button id="applyBtn" class="btn primary">Apply</button>
      <button id="clearFilters" class="btn">Clear</button>
    </div>
  </aside>

  <script src="/app.js"></script>
</body>
</html>
